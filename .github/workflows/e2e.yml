name: Demoblaze E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Daily smoke run at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite folder to run (ui | api | e2e — blank = all)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  quality:
    name: "Quality Gate (typecheck + lint + format)"
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run quality

  test:
    name: "${{ matrix.project }} — Shard ${{ matrix.shard }}/4 — ${{ github.event.inputs.suite || 'all suites' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [quality]
    env:
      CI: true
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      CHECKOUT_NAME: ${{ secrets.CHECKOUT_NAME }}
      CHECKOUT_COUNTRY: ${{ secrets.CHECKOUT_COUNTRY }}
      CHECKOUT_CITY: ${{ secrets.CHECKOUT_CITY }}
      CHECKOUT_CARD: ${{ secrets.CHECKOUT_CARD }}
      CHECKOUT_MONTH: ${{ secrets.CHECKOUT_MONTH }}
      CHECKOUT_YEAR: ${{ secrets.CHECKOUT_YEAR }}

    strategy:
      fail-fast: false
      matrix:
        project: [chromium] ##[firefox, webkit] # Excluded for now due to test stability issues, will be re-enabled in future iterations
        shard: [1, 2, 3, 4] # Shard tests across 4 parallel jobs for faster execution

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup test environment variables
        run: |
          cat > .env << EOF
          BASE_URL=https://www.demoblaze.com
          API_URL=https://api.demoblaze.com
          TEST_USERNAME=${TEST_USERNAME:-\$TEST_USERNAME}
          TEST_PASSWORD=${TEST_PASSWORD:-\$TEST_PASSWORD}
          CHECKOUT_NAME=${CHECKOUT_NAME:-\$CHECKOUT_NAME}
          CHECKOUT_COUNTRY=${CHECKOUT_COUNTRY:-\$CHECKOUT_COUNTRY}
          CHECKOUT_CITY=${CHECKOUT_CITY:-\$CHECKOUT_CITY}
          CHECKOUT_CARD=${CHECKOUT_CARD:-\$CHECKOUT_CARD}
          CHECKOUT_MONTH=${CHECKOUT_MONTH:-\$CHECKOUT_MONTH}
          CHECKOUT_YEAR=${CHECKOUT_YEAR:-\$CHECKOUT_YEAR}
          EOF
          echo "✓ Environment file created (11 variables)"

      - name: Preflight credentials check
        run: |
          if [ -z "${TEST_USERNAME}" ] || [ -z "${TEST_PASSWORD}" ]; then
            echo "::warning::TEST_USERNAME/TEST_PASSWORD not configured. Auth-required tests may be skipped by design."
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Run tests
        run: |
          if [ -n "${{ github.event.inputs.suite }}" ]; then
            npx playwright test tests/${{ github.event.inputs.suite }}/ \
              --project=${{ matrix.project }} \
              --shard=${{ matrix.shard }}/4 \
              --reporter=blob,github
          else
            npx playwright test \
              --project=${{ matrix.project }} \
              --shard=${{ matrix.shard }}/4 \
              --reporter=blob,github
          fi
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-${{ matrix.project }}-shard-${{ matrix.shard }}
          path: blob-report/
          retention-days: 14

  api-tests:
    name: "API Tests (chromium)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality]
    env:
      CI: true
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Setup test environment for API tests
        run: |
          cat > .env << EOF
          BASE_URL=https://www.demoblaze.com
          API_URL=https://api.demoblaze.com
          TEST_USERNAME=${TEST_USERNAME:-\$TEST_USERNAME}
          TEST_PASSWORD=${TEST_PASSWORD:-\$TEST_PASSWORD}
          EOF

      - name: Preflight credentials check
        run: |
          if [ -z "${TEST_USERNAME}" ] || [ -z "${TEST_PASSWORD}" ]; then
            echo "::warning::TEST_USERNAME/TEST_PASSWORD not configured. Auth-dependent API checks may be skipped."
          fi

      - name: Run API tests
        run: npx playwright test tests/api/ --project=chromium --reporter=blob,github
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-api
          path: blob-report/
          retention-days: 14

  merge-reports:
    name: "Merge Test Reports"
    if: always() && needs.quality.result == 'success'
    needs: [quality, test, api-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports
          pattern: blob-report-*

      - name: Merge Playwright results
        run: |
          npm init -y
          npm install -D @playwright/test
          npx playwright merge-reports --reporter=html all-reports

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-merged-report
          path: playwright-report/
          retention-days: 30
