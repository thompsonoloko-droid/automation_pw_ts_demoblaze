name: Demoblaze E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Daily smoke run at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite folder to run (ui | api | e2e — blank = all)"
        required: false
        default: ""

jobs:
  test:
    name: "${{ matrix.project }} — Shard ${{ matrix.shard }}/4 — ${{ github.event.inputs.suite || 'all suites' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        project: [chromium] ##[firefox, webkit] # Excluded for now due to test stability issues, will be re-enabled in future iterations
        shard: [1, 2, 3, 4] # Shard tests across 4 parallel jobs for faster execution

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup test environment variables
        run: |
          cat > .env << EOF
          BASE_URL=https://www.demoblaze.com
          API_URL=https://api.demoblaze.com
          TEST_USERNAME=${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD=${{ secrets.TEST_PASSWORD }}
          CHECKOUT_NAME=${{ secrets.CHECKOUT_NAME }}
          CHECKOUT_COUNTRY=${{ secrets.CHECKOUT_COUNTRY }}
          CHECKOUT_CITY=${{ secrets.CHECKOUT_CITY }}
          CHECKOUT_CARD=${{ secrets.CHECKOUT_CARD }}
          CHECKOUT_MONTH=${{ secrets.CHECKOUT_MONTH }}
          CHECKOUT_YEAR=${{ secrets.CHECKOUT_YEAR }}
          EOF
          echo "✓ Environment file created (11 variables)"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Run tests
        run: |
          if [ -n "${{ github.event.inputs.suite }}" ]; then
            npx playwright test tests/${{ github.event.inputs.suite }}/ \
              --project=${{ matrix.project }} \
              --shard=${{ matrix.shard }}/4 \
              --reporter=json,github,html
          else
            npx playwright test \
              --project=${{ matrix.project }} \
              --shard=${{ matrix.shard }}/4 \
              --reporter=json,github,html
          fi
        env:
          CI: true
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          CHECKOUT_NAME: ${{ secrets.CHECKOUT_NAME }}
          CHECKOUT_COUNTRY: ${{ secrets.CHECKOUT_COUNTRY }}
          CHECKOUT_CITY: ${{ secrets.CHECKOUT_CITY }}
          CHECKOUT_CARD: ${{ secrets.CHECKOUT_CARD }}
          CHECKOUT_MONTH: ${{ secrets.CHECKOUT_MONTH }}
          CHECKOUT_YEAR: ${{ secrets.CHECKOUT_YEAR }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}-shard-${{ matrix.shard }}
          path: reports/
          retention-days: 14

  api-tests:
    name: "API Tests (chromium)"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Setup test environment for API tests
        run: |
          cat > .env << EOF
          BASE_URL=https://www.demoblaze.com
          API_URL=https://api.demoblaze.com
          TEST_USERNAME=${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD=${{ secrets.TEST_PASSWORD }}
          EOF

      - name: Run API tests
        run: npx playwright test tests/api/ --project=chromium --reporter=json,github,html
        env:
          CI: true
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: reports/
          retention-days: 14

  merge-reports:
    name: "Merge Test Reports"
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports
          pattern: playwright-report-*

      - name: Merge Playwright results
        run: |
          npm init -y
          npm install -D @playwright/test
          npx playwright merge-reports --output-folder merged-results all-reports

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-merged-report
          path: merged-results/
          retention-days: 30
